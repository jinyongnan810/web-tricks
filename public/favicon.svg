<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <linearGradient id="sparkle-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e4e4e7"/>
    </linearGradient>
  </defs>
  <!-- Background Container -->
  <rect width="32" height="32" rx="7" fill="url(#bg-grad)"/>
  <rect width="32" height="32" rx="7" fill="none" stroke="#27272a" stroke-width="1"/>
  
  <!-- Left Bracket < (Bolder & Larger) -->
  <path d="M 9.5 8 L 3.5 16 L 9.5 24" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <!-- Right Bracket > (Bolder & Larger) -->
  <path d="M 22.5 8 L 28.5 16 L 22.5 24" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <!-- Prominent Central Magic Sparkle Star -->
  <path d="M 16 6.5 C 16 12.5 12 16 7.5 16 C 12 16 16 19.5 16 25.5 C 16 19.5 20 16 24.5 16 C 20 16 16 12.5 16 6.5 Z" fill="url(#sparkle-grad)"/>
</svg>
